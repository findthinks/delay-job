syntax = "proto3";

package delay.job;
option java_package = "com.findthinks.delay.job.facade.grpc.cb";
option java_multiple_files = true;

message CallbackJobInfo {
    string outJobNo = 1;
    int64 triggerTime = 2;
    string jobInfo = 3;
}

message CallbackReq {
    repeated CallbackJobInfo jobs = 1;
}

message CallbackResp {
    string code = 1;
    string message = 2;
}

service JobCallback {
    rpc trigger(CallbackReq) returns (CallbackResp) {
    }
}